# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # JavaScript / Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'Alisha-21-cloud'
    labels:
      - 'dependencies'
    groups:
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
      react-email:
        patterns:
          - '@react-email/*'
          - 'react-email'
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
      prisma:
        patterns:
          - '@prisma/client'
          - 'prisma'

  # Python dependencies
  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'Alisha-21-cloud'
    labels:
      - 'dependencies'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'Alisha-21-cloud'
    labels:
      - 'dependencies'
